name: Release AIRemoteDesk

on:
  workflow_dispatch:
    inputs:
      upload-tag:
        description: 'Release tag name'
        required: true
        default: 'nightly'

jobs:
  build:
    uses: ./.github/workflows/flutter-build.yml
    with:
      upload-artifact: true
      upload-tag: ${{ github.event.inputs.upload-tag }}
    secrets: inherit
